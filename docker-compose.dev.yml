services:

  # ── PostgreSQL (dev) ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zemloveka
      POSTGRES_USER:     zemloveka
      POSTGRES_PASSWORD: zemloveka_dev
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zemloveka -d zemloveka"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Next.js dev server (hot reload, source mounted) ───────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules          # anonymous volume keeps container node_modules
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://zemloveka:zemloveka_dev@db:5432/zemloveka
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_BASE_URL: ${GEMINI_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-3-flash-preview}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-3-flash-preview}
      GEMINI_ONBOARDING_MODEL: ${GEMINI_ONBOARDING_MODEL:-gemini-3-flash-preview}
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev:
